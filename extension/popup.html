<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Animated Background Grid -->
    <div class="grid-bg"></div>
    <div class="scan-line"></div>

    <!-- Header -->
    <header class="header">
      <div class="logo-section">
        <div class="logo-glow"></div>
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="logo-text">
          <span class="title">DESIGN</span>
          <span class="subtitle">DOWNLOADER</span>
        </div>
      </div>
      <div class="status-dot-wrapper" id="serverStatus" title="Server Offline">
        <span class="status-dot"></span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- URL Input Section -->
      <section class="input-section">
        <div class="input-wrapper">
          <div class="input-glow"></div>
          <input
            type="text"
            id="urlInput"
            placeholder="Paste Behance, Dribbble or Pinterest URL..."
            autocomplete="off"
          >
          <button class="paste-btn" id="pasteBtn" title="Paste from clipboard">
            <svg viewBox="0 0 24 24" fill="none">
              <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 15H4C2.89543 15 2 14.1046 2 13V4C2 2.89543 2.89543 2 4 2H13C14.1046 2 15 2.89543 15 4V5" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </button>
        </div>

        <div class="platform-detect" id="platformDetect">
          <span class="platform-icon"></span>
          <span class="platform-name">Auto-detect platform</span>
        </div>
      </section>

      <!-- Folder Selection -->
      <section class="folder-section">
        <div class="folder-select-wrapper">
          <svg class="folder-icon" viewBox="0 0 24 24" fill="none">
            <path d="M3 7C3 5.89543 3.89543 5 5 5H9L11 7H19C20.1046 7 21 7.89543 21 9V17C21 18.1046 20.1046 19 19 19H5C3.89543 19 3 18.1046 3 17V7Z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <select id="folderSelect" class="folder-select">
            <option value="">Default folder</option>
          </select>
          <button class="add-folder-btn" id="addFolderBtn" title="New folder">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Quick Actions -->
      <section class="actions-section">
        <button class="action-btn primary" id="downloadBtn">
          <div class="btn-glow"></div>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
            <path d="M21 15V19C21 20.1046 20.1046 21 19 21H5C3.89543 21 3 20.1046 3 19V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 3V15M12 15L7 10M12 15L17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>DOWNLOAD</span>
        </button>

        <button class="action-btn secondary" id="currentPageBtn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>CURRENT</span>
        </button>
      </section>

      <!-- Queue Section -->
      <section class="queue-section">
        <div class="section-header">
          <h3>
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M3 6H21M3 12H21M3 18H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            QUEUE
          </h3>
          <span class="queue-count" id="queueCount">0</span>
        </div>

        <div class="queue-list" id="queueList">
          <div class="queue-empty">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M20 7L12 3L4 7M20 7L12 11M20 7V17L12 21M12 11L4 7M12 11V21M4 7V17L12 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>No downloads in queue</span>
          </div>
        </div>
      </section>

      <!-- Bulk Downloader Section -->
      <section class="accordion-container">
        <div class="accordion-item" id="bulkAccordion">
          <button class="accordion-header" data-target="bulkContent">
            <div class="accordion-title">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M4 16L4 17C4 18.6569 5.34315 20 7 20L17 20C18.6569 20 20 18.6569 20 17L20 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M12 4L12 14M12 14L8 10M12 14L16 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>BULK DOWNLOADER</span>
              <span class="free-badge" id="freeBadge">1 FREE</span>
            </div>
            <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none">
              <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="accordion-content" id="bulkContent">
            <div class="accordion-inner">
              <!-- Free usage info -->
              <div class="usage-info" id="usageInfo">
                <div class="usage-bar">
                  <div class="usage-fill" id="usageFill"></div>
                </div>
                <span class="usage-text" id="usageText">1 free bulk download remaining</span>
              </div>

              <!-- Bulk URL Input -->
              <div class="bulk-input-section" id="bulkInputSection">
                <textarea id="bulkUrls" placeholder="Paste multiple URLs (one per line)..."></textarea>
                <button class="bulk-start-btn" id="bulkStartBtn">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M4 16L4 17C4 18.6569 5.34315 20 7 20L17 20C18.6569 20 20 18.6569 20 17L20 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M12 4L12 14M12 14L8 10M12 14L16 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span>Start Bulk Download</span>
                </button>
              </div>

              <!-- PRO Upgrade (hidden initially) -->
              <div class="pro-section hidden" id="proSection">
                <div class="pro-info">
                  <p>You've used your free bulk download!</p>
                  <ul>
                    <li>Unlimited bulk downloads</li>
                    <li>Auto-organize by project</li>
                    <li>Download history</li>
                    <li>Priority support</li>
                  </ul>
                </div>
                <button class="upgrade-btn" id="upgradeBtn">
                  <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span>Upgrade to PRO - $9.99</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <button class="footer-btn" id="settingsBtn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 1V3M12 21V23M23 12H21M3 12H1M20.5 3.5L19 5M5 19L3.5 20.5M20.5 20.5L19 19M5 5L3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="footer-info">
        <span class="version">v1.0.0</span>
      </div>
      <button class="footer-btn" id="clearBtn" title="Clear completed">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M3 6H21M19 6V20C19 21 18 22 17 22H7C6 22 5 21 5 20V6M8 6V4C8 3 9 2 10 2H14C15 2 16 3 16 4V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </footer>

    <!-- Settings Panel (Hidden by default) -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-header">
        <h3>SETTINGS</h3>
        <button class="close-btn" id="closeSettings">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="settings-content">
        <div class="setting-item">
          <label>Download Folder</label>
          <div class="setting-input-group">
            <input type="text" id="downloadFolder" placeholder="~/Downloads/DesignDownloader">
            <button class="setting-btn" id="saveFolderBtn">SAVE</button>
          </div>
        </div>
        <div class="setting-item">
          <label>Server URL</label>
          <input type="text" id="serverUrl" value="http://localhost:5200" placeholder="http://localhost:5200">
        </div>
        <div class="setting-item">
          <label>Folders</label>
          <div class="folders-list" id="foldersList">
            <!-- Folders will be rendered here -->
          </div>
          <div class="setting-input-group">
            <input type="text" id="newFolderInput" placeholder="New folder name...">
            <button class="setting-btn" id="createFolderBtn">ADD</button>
          </div>
        </div>
      </div>
    </div>

    <!-- New Folder Modal -->
    <div class="modal" id="folderModal">
      <div class="modal-content">
        <div class="modal-header">
          <h4>Create Folder</h4>
          <button class="close-btn" id="closeFolderModal">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <input type="text" id="modalFolderName" placeholder="Folder name...">
        </div>
        <div class="modal-footer">
          <button class="modal-btn secondary" id="cancelFolderBtn">Cancel</button>
          <button class="modal-btn primary" id="confirmFolderBtn">Create</button>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
